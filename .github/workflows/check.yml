name: Pre-Commit
on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: write
  pull-requests: write

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # install uv
      - uses: astral-sh/setup-uv@v7
      # run pre-commit
      - uses: pre-commit/action@v3.0.0
